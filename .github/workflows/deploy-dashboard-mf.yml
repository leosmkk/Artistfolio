name: Deploy dashboard-mf

on:
  push:
    branches: [main]
    paths:
      - "packages/dashboard-mf/**"
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy dashboard-mf
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: packages/dashboard-mf/package-lock.json

      - name: Install dependencies
        working-directory: packages/dashboard-mf
        run: npm ci

      - name: Build
        working-directory: packages/dashboard-mf
        run: npm run build

      - name: Copy SWA config
        run: cp packages/dashboard-mf/staticwebapp.config.json packages/dashboard-mf/dist/

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_DASHBOARD_MF }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          skip_app_build: true
          app_location: "packages/dashboard-mf/dist"
